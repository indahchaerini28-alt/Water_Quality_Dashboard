<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Water Quality Dashboard</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

/* ===== GLOBAL ===== */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f5f7fb;
    color:#111827;
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:230px;
    height:100vh;
    position:fixed;
    background:#0f172a;
    padding:20px;
    color:white;
}

.sidebar img{
    width:140px;
    display:block;
    margin:auto;
    margin-bottom:25px;
}

.sidebar a{
    display:block;
    color:#cbd5e1;
    text-decoration:none;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    font-weight:600;
    transition:0.3s;
}

.sidebar a:hover{
    background:#1e293b;
    color:white;
}

/* ===== MAIN ===== */
.main{
    margin-left:230px;
    padding:25px;
}

/* ===== TOP BOX ===== */
.top-box{
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:white;
    text-align:center;
    padding:25px;
    border-radius:18px;
    margin-bottom:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* ===== SENSOR CARD ===== */
.card-grid{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.data-card{
    width:240px;
    padding:20px;
    border-radius:18px;
    display:flex;
    align-items:center;
    gap:15px;
    color:white;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    box-shadow:0 10px 25px rgba(37,99,235,0.25);
    transition:all 0.4s ease;
    position:relative;
    overflow:hidden;
    cursor:pointer;
}

.data-card::before{
    content:"";
    position:absolute;
    width:120px;
    height:120px;
    background:rgba(255,255,255,0.15);
    border-radius:50%;
    top:-40px;
    right:-40px;
}

.data-card:hover{
    transform:translateY(-8px) scale(1.04) rotate(-1deg);
    box-shadow:0 18px 40px rgba(37,99,235,0.4);
}

.data-card i{
    font-size:24px;
    width:50px;
    height:50px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,0.18);
    border-radius:14px;
}

/* ===== CHART ===== */
.chart-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.chart-card{
    background:white;
    border:1px solid #e5e7eb;
    padding:20px;
    border-radius:18px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.chart-container{
    height:280px;
    position:relative;
}

.chart-container canvas{
    width:100% !important;
    height:100% !important;
    display:block;
}

/* RESPONSIVE */
@media(max-width:768px){

    .chart-grid{
        grid-template-columns:1fr;
    }

    .sidebar{
        position:relative;
        width:100%;
        height:auto;
    }

    .main{
        margin-left:0;
    }
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<img src="assets/img/water_quality_logo.png" alt="Logo">

<a href="index.html">
<i class="fa fa-home"></i> Dashboard
</a>

<a href="datatables.html">
<i class="fa fa-table"></i> History
</a>

</div>

<!-- MAIN -->
<div class="main">

<div class="top-box">

<h2>Water Quality Dashboard</h2>

<h4 id="waterStatus"
style="
margin-top:15px;
font-weight:bold;
font-size:28px;
">
Status Air : -
</h4>

<div
id="statusDesc"
style="
font-size:15px;
margin-top:8px;
">
Menunggu data sensor...
</div>

<br>

WebSocket:
<span id="wsStatus">Disconnected</span>

<div id="wsText">
Waiting ESP32...
</div>

</div>

<!-- SENSOR CARD -->
<div class="card-grid">

<div class="data-card">
<i class="fa-solid fa-flask"></i>

<div>
<h5>pH</h5>
<h2 id="phValue">0</h2>
</div>
</div>

<div class="data-card">
<i class="fa-solid fa-water"></i>

<div>
<h5>Kekeruhan</h5>
<h2 id="turbValue">0 NTU</h2>
</div>
</div>

<div class="data-card">
<i class="fa-solid fa-droplet"></i>

<div>
<h5>Salinitas</h5>
<h2 id="saltValue">0 PPT</h2>
</div>
</div>

</div>

<!-- CHART -->
<div class="chart-grid">

<div class="chart-card">

<h3>Grafik pH Air</h3>

<div class="chart-container">
<canvas id="phChart"></canvas>
</div>

</div>

<div class="chart-card">

<h3>Grafik Kekeruhan Air</h3>

<div class="chart-container">
<canvas id="turbChart"></canvas>
</div>

</div>

<div class="chart-card">

<h3>Grafik Salinitas Air</h3>

<div class="chart-container">
<canvas id="saltChart"></canvas>
</div>

</div>

</div>

</div>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig = {

apiKey:
"YOUR_API_KEY",

databaseURL:
"YOUR_DATABASE_URL"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* ================= VARIABLE ================= */

let ws;

let labels = [];

let phData = [];

let turbData = [];

let saltData = [];

let minuteCounter = 1;

/* ================= CREATE CHART ================= */

function createChart(id,label,color,data,yTitle){

    return new Chart(document.getElementById(id),{

        type:'line',

        data:{

            labels:labels,

            datasets:[{

                label:label,

                data:data,

                borderColor:color,

                backgroundColor:'transparent',

                borderWidth:2,

                tension:0.3,

                fill:false,

                pointRadius:4,

                pointHoverRadius:6
            }]
        },

        options:{

            responsive:true,

            maintainAspectRatio:false,

            plugins:{
                legend:{
                    display:false
                }
            },

            scales:{

                x:{
                    title:{
                        display:true,
                        text:'Menit Pengambilan Data',
                        color:'#111827',
                        font:{
                            size:12,
                            weight:'bold'
                        }
                    },
                    ticks:{
                        color:'#111827'
                    },
                    grid:{
                        display:false
                    }
                },

                y:{
                    title:{
                        display:true,
                        text:yTitle,
                        color:'#111827',
                        font:{
                            size:12,
                            weight:'bold'
                        }
                    },
                    ticks:{
                        color:'#111827'
                    },
                    beginAtZero:false
                }

            }

        }

    });

}

/* ================= CHART INIT ================= */

let phChart =
createChart(
"phChart",
"pH",
"#3b82f6",
phData,
"Nilai pH"
);

let turbChart =
createChart(
"turbChart",
"NTU",
"#f59e0b",
turbData,
"Kekeruhan (NTU)"
);

let saltChart =
createChart(
"saltChart",
"Salinitas",
"#10b981",
saltData,
"Salinitas (PPT)"
);

/* ================= WEBSOCKET ================= */

function connectWS(){

    ws = new WebSocket(
    "ws://pantyhose-persecute-briskly.ngrok-free.dev"
    );

    /* CONNECTED */
    ws.onopen = () => {

        document.getElementById("wsStatus").innerText =
        "Connected";

        document.getElementById("wsText").innerText =
        "ESP32 Online";

        console.log("[WS] Connected");

    };

    /* RECEIVE DATA */
    ws.onmessage = (event) => {

        console.log("DATA:", event.data);

        const data =
        JSON.parse(event.data);

        if(data.ph === undefined)
        return;

        /* SENSOR */

        document.getElementById("phValue").innerText =
        parseFloat(data.ph).toFixed(2);

        document.getElementById("turbValue").innerText =
        parseFloat(data.turbidity).toFixed(2)
        +" NTU";

        document.getElementById("saltValue").innerText =
        parseFloat(data.salinity).toFixed(2)
        +" PPT";

        /* STATUS AIR */

        if(data.status === "Baik"){

            document.getElementById("waterStatus").innerHTML =
            "Status Air : ✅ BAIK";

            document.getElementById("statusDesc").innerHTML =
            "Air layak digunakan untuk kebutuhan rumah tangga non konsumsi";

        }

        else{

            document.getElementById("waterStatus").innerHTML =
            "Status Air : ❌ BURUK";

            document.getElementById("statusDesc").innerHTML =
            "Air perlu filtrasi atau tidak layak digunakan";

        }

        /* SAVE FIREBASE */

        db.ref("history").push({

            timestamp:
            data.timestamp ||

            new Date().toLocaleString(),

            ph:data.ph,

            turbidity:data.turbidity,

            salinity:data.salinity,

            status:data.status || "-",

            ph_category:
            data.ph_category || "-",

            turbidity_category:
            data.turbidity_category || "-",

            salinity_category:
            data.salinity_category || "-"

        });

        /* CHART */

        labels.push(minuteCounter);

        minuteCounter++;

        phData.push(
        parseFloat(data.ph)
        );

        turbData.push(
        parseFloat(data.turbidity)
        );

        saltData.push(
        parseFloat(data.salinity)
        );

        /* MAX 10 DATA */

        if(labels.length > 10){

            labels.shift();

            phData.shift();

            turbData.shift();

            saltData.shift();

        }

        phChart.update();

        turbChart.update();

        saltChart.update();

    };

    /* ERROR */

    ws.onerror = (error) => {

        console.log(
        "[WS ERROR]",
        error
        );

    };

    /* DISCONNECTED */

    ws.onclose = () => {

        console.log(
        "[WS] Disconnected"
        );

        document.getElementById("wsStatus").innerText =
        "Disconnected";

        document.getElementById("wsText").innerText =
        "Reconnecting...";

        setTimeout(
        connectWS,
        2000
        );

    };

}

/* ================= START ================= */

connectWS();

</script>

</body>
</html>
